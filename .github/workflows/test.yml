# Test TeachBook from first-run environments.
# Manual-only: do not run this on every push or pull request.
# Maintainers should launch it only when validating setup/CI changes.
name: Test Clean Setup

on:
  workflow_dispatch:  # Manual launch only.

env:
  # Opt in early to GitHub's Node 24 runtime for JavaScript actions.
  # This avoids Node 20 deprecation warnings on official actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # Quick syntax check first
  syntax:
    name: "Syntax Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: Verify all scripts compile
        run: |
          for f in scripts/*.py; do
            python -m py_compile "$f" && echo "✅ $f" || exit 1
          done
      - name: Verify skills exist
        run: |
          for d in .github/skills/*/; do
            [ -f "${d}SKILL.md" ] && echo "✅ ${d}" || { echo "❌ ${d}SKILL.md missing"; exit 1; }
          done

  # Test on macOS (Apple Silicon) — no Python, no git, no uv pre-installed
  test-macos:
    needs: syntax
    name: "macOS (M-series) — Clean Setup"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      # GitHub runners have Python pre-installed, but we test the script
      # still works correctly as if it were a fresh Mac
      - name: Remove pre-existing venv if any
        run: rm -rf .venv

      - name: Run setup_env.py
        run: |
          python3 scripts/setup_env.py --yes --profile

      - name: Verify venv
        run: |
          test -d .venv || { echo "❌ No .venv"; exit 1; }
          .venv/bin/python --version
          .venv/bin/python -c "import sys; assert sys.version_info[:2] == (3, 12), sys.version"
          .venv/bin/python -m pip --version
          .venv/bin/python -c "import importlib.util; assert importlib.util.find_spec('manim') is None"
          .venv/bin/python -c "import importlib.util; assert importlib.util.find_spec('numpy') is None"
          .venv/bin/python -c "import importlib.util; assert importlib.util.find_spec('pymupdf4llm') is None"
          echo "✅ venv OK"

      - name: Verify skill sync
        run: |
          for dir in .claude/skills .agents/skills .agent/skills; do
            test -d "$dir" && echo "✅ $dir" || { echo "❌ $dir missing"; exit 1; }
          done
          test -f .github/copilot-instructions.md && echo "✅ copilot-instructions" || { echo "❌ copilot-instructions missing"; exit 1; }

      - name: Check static assets
        run: .venv/bin/python scripts/optimize_static_assets.py --check

      - name: Build book
        run: .venv/bin/python scripts/build_book.py

      - name: Verify build output
        run: |
          test -f book/_build/html/index.html || { echo "❌ No index.html"; exit 1; }
          test -d book/_build/html/es || { echo "❌ No es/"; exit 1; }
          test -d book/_build/html/en || { echo "❌ No en/"; exit 1; }
          echo "✅ Build OK"

      - name: Test PDF toolchain setup (same as CI/CD)
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          .venv/bin/python scripts/setup_env.py --yes --extras pdf
          .venv/bin/python scripts/setup_latex.py --yes --full

      - name: Test PDF export on macOS with CI/CD engine policy
        timeout-minutes: 45
        run: |
          .venv/bin/python scripts/export_pdf.py --engine auto
          test -f book/_static/ElaboracionDeLibrosElectronicosMedianteCodigoYAsistentesDeInteligenciaArtificial.pdf || { echo "❌ No Spanish PDF generated"; exit 1; }
          test -f book/_static/CreatingElectronicBooksWithCodeAndArtificialIntelligenceAssistants.pdf || { echo "❌ No English PDF generated"; exit 1; }
          echo "✅ PDF export OK on macOS"

      - name: Test pdf_to_markdown
        run: |
          .venv/bin/python scripts/setup_env.py --yes --extras pdf-import
          .venv/bin/python -c "
          import fitz
          doc = fitz.open()
          page = doc.new_page()
          page.insert_text((72, 72), 'TeachBook Test')
          doc.save('/tmp/test.pdf')
          doc.close()
          "
          .venv/bin/python scripts/pdf_to_markdown.py /tmp/test.pdf --output /tmp/test_md
          test -f /tmp/test_md/test.md && echo "✅ PDF→MD OK" || { echo "❌ PDF→MD failed"; exit 1; }

  # Test on Windows — the #1 OS for non-technical users
  test-windows:
    needs: syntax
    name: "Windows — Clean Setup"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      - name: Remove pre-existing venv if any
        shell: pwsh
        run: if (Test-Path .venv) { Remove-Item -Recurse -Force .venv }

      - name: Run setup_env.py
        shell: pwsh
        run: |
          python scripts/setup_env.py --yes --profile

      - name: Verify venv
        shell: pwsh
        run: |
          if (-Not (Test-Path .venv)) { Write-Error "No .venv"; exit 1 }
          .venv\Scripts\python.exe --version
          .venv\Scripts\python.exe -c "import sys; assert sys.version_info[:2] == (3, 12), sys.version"
          .venv\Scripts\python.exe -m pip --version
          .venv\Scripts\python.exe -c "import importlib.util; assert importlib.util.find_spec('manim') is None"
          .venv\Scripts\python.exe -c "import importlib.util; assert importlib.util.find_spec('numpy') is None"
          .venv\Scripts\python.exe -c "import importlib.util; assert importlib.util.find_spec('pymupdf4llm') is None"
          Write-Output "✅ venv OK"

      - name: Verify skill sync
        shell: pwsh
        run: |
          @(".claude\skills", ".agents\skills", ".agent\skills") | ForEach-Object {
            if (Test-Path $_) { Write-Output "✅ $_" }
            else { Write-Error "❌ $_ missing"; exit 1 }
          }
          if (Test-Path ".github\copilot-instructions.md") { Write-Output "✅ copilot-instructions" }
          else { Write-Error "❌ copilot-instructions missing"; exit 1 }

      - name: Check static assets
        shell: pwsh
        run: .venv\Scripts\python.exe scripts\optimize_static_assets.py --check

      - name: Build book
        shell: pwsh
        run: .venv\Scripts\python.exe scripts/build_book.py

      - name: Verify build output
        shell: pwsh
        run: |
          if (-Not (Test-Path "book\_build\html\index.html")) { Write-Error "No index.html"; exit 1 }
          if (-Not (Test-Path "book\_build\html\es")) { Write-Error "No es/"; exit 1 }
          if (-Not (Test-Path "book\_build\html\en")) { Write-Error "No en/"; exit 1 }
          Write-Output "✅ Build OK"

      - name: Test preview launcher and HTTP server
        shell: pwsh
        timeout-minutes: 10
        run: |
          $ErrorActionPreference = "Stop"
          $port = 8765
          $baseUrl = "http://127.0.0.1:$port"

          function Show-PreviewLog {
            if (Test-Path ".preview.log") {
              Write-Output "--- .preview.log (tail) ---"
              Get-Content ".preview.log" -Tail 80
              Write-Output "--- end .preview.log ---"
            } else {
              Write-Output "No .preview.log found yet."
            }
          }

          try {
            Write-Output "Starting preview through the same command agents use..."
            .venv\Scripts\python.exe scripts\launch_preview.py --background --no-browser --no-watch --port $port

            $deadline = (Get-Date).AddMinutes(6)
            $ready = $false

            while ((Get-Date) -lt $deadline) {
              Start-Sleep -Seconds 5

              Write-Output "Checking preview process status..."
              .venv\Scripts\python.exe scripts\launch_preview.py --status

              try {
                $response = Invoke-WebRequest -Uri "$baseUrl/" -UseBasicParsing -TimeoutSec 5
                if ($response.StatusCode -eq 200) {
                  $ready = $true
                  break
                }
              } catch {
                Write-Output "Preview not ready yet: $($_.Exception.Message)"
              }
            }

            if (-not $ready) {
              Show-PreviewLog
              throw "Preview server did not answer HTTP 200 at $baseUrl/ in time."
            }

            foreach ($path in @("/", "/es/", "/en/")) {
              $url = "$baseUrl$path"
              Write-Output "Checking $url"
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -ne 200) {
                throw "Preview returned HTTP $($response.StatusCode) for $url"
              }
            }

            Write-Output "✅ Preview server responded correctly on Windows."
          }
          finally {
            Show-PreviewLog
            .venv\Scripts\python.exe scripts\launch_preview.py --stop
          }

      - name: Test PDF toolchain setup (same as CI/CD)
        shell: pwsh
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          .venv\Scripts\python.exe scripts/setup_env.py --yes --extras pdf
          .venv\Scripts\python.exe scripts/setup_latex.py --yes --full

      - name: Test PDF export on Windows with CI/CD engine policy
        shell: pwsh
        timeout-minutes: 45
        run: |
          .venv\Scripts\python.exe scripts\export_pdf.py --engine auto
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-Not (Test-Path "book\_static\ElaboracionDeLibrosElectronicosMedianteCodigoYAsistentesDeInteligenciaArtificial.pdf")) { Write-Error "No Spanish PDF generated"; exit 1 }
          if (-Not (Test-Path "book\_static\CreatingElectronicBooksWithCodeAndArtificialIntelligenceAssistants.pdf")) { Write-Error "No English PDF generated"; exit 1 }
          Write-Output "✅ PDF export OK on Windows"

      - name: Test pdf_to_markdown
        shell: pwsh
        run: |
          .venv\Scripts\python.exe scripts/setup_env.py --yes --extras pdf-import
          $testPdf = Join-Path $env:RUNNER_TEMP "test.pdf"
          $testOut = Join-Path $env:RUNNER_TEMP "test_md"
          .venv\Scripts\python.exe -c "import fitz; doc=fitz.open(); page=doc.new_page(); page.insert_text((72,72),'Test'); doc.save(r'$testPdf'); doc.close()"
          .venv\Scripts\python.exe scripts/pdf_to_markdown.py $testPdf --output $testOut
          if (Test-Path "$testOut\test.md") { Write-Output "✅ PDF→MD OK" }
          else { Write-Error "❌ PDF→MD failed"; exit 1 }
